services:
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ${DOCKER_ENV_FILE:-.env}
    environment:
      HF_HOME: /opt/hf-cache
      HF_HUB_OFFLINE: "1"
      STORAGE_ROOT: /data
      FAISS_DATA_DIR: /data/vectors
    ports:
      - "18001:8000"
    volumes:
      - ${STORAGE_HOST_PATH:-./storage}:/data
      - ./storage/data/checkpoints:/data/checkpoints:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2500M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["rq", "worker", "--with-scheduler", "--url", "${REDIS_URL}", "ingest"]
    env_file:
      - ${DOCKER_ENV_FILE:-.env}
    environment:
      HF_HOME: /opt/hf-cache
      HF_HUB_OFFLINE: "1"
      STORAGE_ROOT: /data
      FAISS_DATA_DIR: /data/vectors
    volumes:
      - ${STORAGE_HOST_PATH:-./storage}:/data
      - ./storage/data/checkpoints:/data/checkpoints:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1500M

  ingest:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.ingest.main"]
    env_file:
      - ${DOCKER_ENV_FILE:-.env}
    environment:
      RAW_DATA_DIR: /raw_data
      STORAGE_ROOT: /data
      FAISS_DATA_DIR: /data/vectors
    volumes:
      - ${STORAGE_HOST_PATH:-./storage}:/data
      - ./storage/data/checkpoints:/data/checkpoints:ro
      - ./ingestion/raw_data:/raw_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    profiles: ["ingest"]
    deploy:
      resources:
        limits:
          memory: 1500M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-visquery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-visquery}
    ports:
      - "15432:5432"
    volumes:
      - ${POSTGRES_DATA_PATH:-./storage/postgres}:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-visquery}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
